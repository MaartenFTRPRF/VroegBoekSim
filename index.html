<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FutureProof Vroegboekactie Simulator</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; padding: 20px; color: #333; }
        .container { max-width: 1000px; margin: 0 auto; background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: #2c3e50; }
        
        .input-section { display: flex; gap: 20px; margin-bottom: 20px; background: #ecf0f1; padding: 20px; border-radius: 8px; flex-wrap: wrap; }
        .input-group { flex: 1; min-width: 200px; display: flex; flex-direction: column; }
        .input-group label { font-weight: bold; margin-bottom: 8px; color: #34495e; }
        .input-group input { padding: 10px; border: 1px solid #bdc3c7; border-radius: 5px; font-size: 16px; }
        
        .discount-banner { display: none; background: #d4edda; color: #155724; padding: 15px; border-radius: 8px; text-align: center; margin-bottom: 30px; border: 1px solid #c3e6cb; font-size: 1.1em; }
        
        .options-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; }
        .option-card { border: 2px solid #ecf0f1; border-radius: 8px; padding: 20px; background: #fff; position: relative; transition: transform 0.2s; display: flex; flex-direction: column;}
        .option-card:hover { transform: translateY(-5px); box-shadow: 0 6px 12px rgba(0,0,0,0.1); border-color: #3498db; }
        .option-title { font-size: 1.2em; font-weight: bold; color: #2980b9; margin-bottom: 10px; border-bottom: 2px solid #ecf0f1; padding-bottom: 10px; }
        
        .pros-cons { font-size: 0.9em; margin-bottom: 15px; flex-grow: 1; }
        .pros { color: #27ae60; margin-bottom: 5px; }
        .cons { color: #c0392b; }
        
        .price-breakdown { font-size: 0.9em; background: #f9f9f9; padding: 10px; border-radius: 5px; margin-bottom: 15px; }
        .price-row { display: flex; justify-content: space-between; margin-bottom: 2px; }
        .price-per-lln { display: flex; justify-content: flex-end; font-size: 0.85em; color: #7f8c8d; margin-bottom: 8px; font-style: italic; }
        .price-per-lln.discounted { color: #27ae60; font-weight: bold; }
        
        .strikethrough { text-decoration: line-through; color: #95a5a6; margin-right: 5px; font-size: 0.9em; }
        
        .total-price { font-size: 1.5em; font-weight: bold; color: #2c3e50; text-align: center; background: #e8f8f5; padding: 10px; border-radius: 5px; border: 1px solid #1abc9c; margin-top: auto; }
    </style>
</head>
<body>

<div class="container">
    <h1>Vroegboekactie Simulator 2026</h1>
    
    <div class="input-section">
        <div class="input-group">
            <label for="leerlingen_enkel">Aantal lln (Enkel Pakket - €15.50)</label>
            <input type="number" id="leerlingen_enkel" value="50" min="0" oninput="calculate()">
        </div>
        <div class="input-group">
            <label for="leerlingen_combi">Aantal lln (Combi Pakket - €25.00)</label>
            <input type="number" id="leerlingen_combi" value="100" min="0" oninput="calculate()">
        </div>
        <div class="input-group">
            <label for="leerkrachten">Aantal leerkrachten (Teachr)</label>
            <input type="number" id="leerkrachten" value="10" min="0" oninput="calculate()">
        </div>
    </div>

    <div id="discount-banner" class="discount-banner">
        </div>

    <div class="options-grid" id="options-container">
        </div>
</div>

<script>
    const options = [
        {
            id: 1, name: "Optie 1: 3 maanden gratis Teachr",
            pros: "Laat ze kennis maken met Teachr als proevertje voor de rest van het schooljaar",
            cons: "Gaat niet als Teachr nog niet goed genoeg is tegen dan",
            pakket: 15.50, combi: 25.00, teachr: 0.00
        },
        {
            id: 2, name: "Optie 2: Combo Upsell",
            pros: "Van 15,50 per pakket naar de combo, maar dan aan 24?",
            cons: "Gaat enkel voor scholen die nog geen combitarief hebben",
            pakket: 15.50, combi: 24.00, teachr: 39.00
        },
        {
            id: 3, name: "Optie 3: Korting op Teachr",
            pros: "Als ze vroeg boeken krijgen ze Teachr aan een goedkopere prijs",
            cons: "Werkt enkel bij scholen die in Teachr geïnteresseerd zijn",
            pakket: 15.50, combi: 25.00, teachr: 29.00
        },
        {
            id: 4, name: "Optie 4: Extra korting op pakket",
            pros: "bv 5% extra korting op pakketten",
            cons: "Lijkt op dat van vorig jaar",
            pakket: 14.725, combi: 23.75, teachr: 39.00
        },
        {
            id: 5, name: "Optie 5: Zelfde prijs als vorig jaar",
            pros: "Vroegboekkorting vorig jaar",
            cons: "Is hetzelfde als vorig jaar",
            pakket: 14.62, combi: 23.60, 
            teachr: 39.00
        }
    ];

    function formatEur(amount) {
        return new Intl.NumberFormat('nl-BE', { style: 'currency', currency: 'EUR' }).format(amount);
    }

    function calculate() {
        const aLlnEnkel = parseInt(document.getElementById('leerlingen_enkel').value) || 0;
        const aLlnCombi = parseInt(document.getElementById('leerlingen_combi').value) || 0;
        const aLeerkrachten = parseInt(document.getElementById('leerkrachten').value) || 0;

        // Bepaal volume voor korting (Combi telt voor 2)
        const volumeScore = aLlnEnkel + (aLlnCombi * 2);
        
        let kortingsPercentage = 0;
        if (volumeScore >= 600) kortingsPercentage = 0.20;
        else if (volumeScore >= 400) kortingsPercentage = 0.15;
        else if (volumeScore >= 300) kortingsPercentage = 0.10;
        else if (volumeScore >= 200) kortingsPercentage = 0.05;

        // Update discount banner
        const banner = document.getElementById('discount-banner');
        if (kortingsPercentage > 0) {
            banner.innerHTML = `<strong>🎉 Volumekorting Actief!</strong> Volume score is ${volumeScore} pakketten. Dat geeft <strong>${(kortingsPercentage * 100)}% extra korting</strong> op alle lespakketten.`;
            banner.style.display = 'block';
        } else {
            banner.style.display = 'none';
        }

        const container = document.getElementById('options-container');
        container.innerHTML = ''; 

        options.forEach(opt => {
            // Basis prijzen (zonder volumekorting)
            const basisEnkel = aLlnEnkel * opt.pakket;
            const basisCombi = aLlnCombi * opt.combi;
            
            // Prijzen met volumekorting
            const costEnkel = basisEnkel * (1 - kortingsPercentage);
            const costCombi = basisCombi * (1 - kortingsPercentage);
            const costTeachr = aLeerkrachten * opt.teachr;
            
            // Effectieve prijs PER LEERLING
            const effPrijsEnkelLln = opt.pakket * (1 - kortingsPercentage);
            const effPrijsCombiLln = opt.combi * (1 - kortingsPercentage);
            
            // Totaal
            const totalCost = costEnkel + costCombi + costTeachr;

            // Opmaak van de prijslijnen
            let enkelTotaalHtml = `<span>${formatEur(costEnkel)}</span>`;
            let combiTotaalHtml = `<span>${formatEur(costCombi)}</span>`;
            
            let llnKlasse = kortingsPercentage > 0 ? "price-per-lln discounted" : "price-per-lln";

            if (kortingsPercentage > 0 && aLlnEnkel > 0) {
                enkelTotaalHtml = `<span><span class="strikethrough">${formatEur(basisEnkel)}</span> ${formatEur(costEnkel)}</span>`;
            }
            if (kortingsPercentage > 0 && aLlnCombi > 0) {
                combiTotaalHtml = `<span><span class="strikethrough">${formatEur(basisCombi)}</span> ${formatEur(costCombi)}</span>`;
            }

            const card = document.createElement('div');
            card.className = `option-card`;
            
            card.innerHTML = `
                <div class="option-title">${opt.name}</div>
                <div class="pros-cons">
                    <div class="pros"><strong>+ Pro:</strong> ${opt.pros}</div>
                    <div class="cons"><strong>- Con:</strong> ${opt.cons}</div>
                </div>
                <div class="price-breakdown">
                    <div class="price-row">
                        <span>Enkel Pakketten:</span> 
                        ${enkelTotaalHtml}
                    </div>
                    ${aLlnEnkel > 0 ? `<div class="${llnKlasse}">(komt neer op ${formatEur(effPrijsEnkelLln)} / lln)</div>` : ''}
                    
                    <div class="price-row" style="margin-top: 5px;">
                        <span>Combi Pakketten:</span> 
                        ${combiTotaalHtml}
                    </div>
                    ${aLlnCombi > 0 ? `<div class="${llnKlasse}">(komt neer op ${formatEur(effPrijsCombiLln)} / lln)</div>` : ''}
                    
                    <div class="price-row" style="margin-top: 10px; border-top: 1px dashed #ccc; padding-top: 5px;">
                        <span>Teachr (à €${opt.teachr}):</span> 
                        <span>${formatEur(costTeachr)}</span>
                    </div>
                </div>
                <div class="total-price">
                    Totaal: ${formatEur(totalCost)}
                </div>
            `;
            container.appendChild(card);
        });
    }

    // Voer calculatie uit bij laden
    calculate();
</script>

</body>
</html>
